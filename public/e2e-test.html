<body>
<h1>AppForge E2E Test Suite</h1>
<p class="subtitle">Mocks the Anthropic API and tests the full app creation flow end-to-end</p>
<div id="progress">Initializing...</div>
<div id="results"></div>
<div id="summary" class="summary running">Running tests...</div>
<div id="log" class="log-area"></div>

<script type="module">
// ─── Test infrastructure ───
const results = [];
const container = document.getElementById('results');
const summaryEl = document.getElementById('summary');
const progressEl = document.getElementById('progress');
const logEl = document.getElementById('log');
let totalTests = 0;
let currentSection = '';

function log(msg, level = 'info') {
  const span = document.createElement('span');
  span.className = level;
  span.textContent = `[${new Date().toISOString().slice(11,19)}] ${msg}\n`;
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function section(name) {
  currentSection = name;
  const h = document.createElement('div');
  h.className = 'section-header';
  h.textContent = name;
  container.appendChild(h);
}

function addResult(name, passed, detail, ms) {
  results.push({ name, passed, detail });
  const div = document.createElement('div');
  div.className = `test ${passed ? 'pass' : 'fail'}`;
  div.innerHTML = `
    <span class="icon">${passed ? '✅' : '❌'}</span>
    <div>
      <div class="name">${name}</div>
      ${detail && !passed ? `<div class="detail">${detail}</div>` : ''}
    </div>
    <span class="time">${ms}ms</span>`;
  container.appendChild(div);
  updateProgress();
}

function skip(name, reason) {
  results.push({ name, passed: null, detail: reason });
  const div = document.createElement('div');
  div.className = 'test skip';
  div.innerHTML = `
    <span class="icon">⏭️</span>
    <div><div class="name">${name}</div><div class="detail" style="color:#94a3b8">${reason}</div></div>`;
  container.appendChild(div);
  updateProgress();
}

function updateProgress() {
  const done = results.length;
  const pass = results.filter(r => r.passed === true).length;
  const fail = results.filter(r => r.passed === false).length;
  progressEl.textContent = `${done}/${totalTests} tests run — ${pass} passed, ${fail} failed`;
}

async function test(name, fn) {
  const t0 = performance.now();
  try {
    await fn();
    addResult(name, true, null, Math.round(performance.now() - t0));
  } catch (e) {
    addResult(name, false, e.message || String(e), Math.round(performance.now() - t0));
    log(`FAIL: ${name}: ${e.message}`, 'error');
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || 'Assertion failed');
}

function assertIncludes(haystack, needle, msg) {
  if (!haystack.includes(needle))
    throw new Error(msg || `Expected "${haystack.slice(0, 80)}..." to include "${needle}"`);
}

// ─── Mock data ───

  .reset { background: #6366f1; color: white; }

</head>

/**
 * Create SSE stream data for a streaming response.
 * Mimics Anthropic's real SSE format.
 */
function createSSEStream(text) {
  const events = [];
  // message_start
  events.push(`event: message_start\ndata: ${JSON.stringify({ type: "message_start", message: { id: "msg_mock", type: "message", role: "assistant", content: [], model: "claude-haiku-4-5-20251001" } })}\n\n`);
  // content_block_start
  events.push(`event: content_block_start\ndata: ${JSON.stringify({ type: "content_block_start", index: 0, content_block: { type: "text", text: "" } })}\n\n`);
  // Send text in chunks of ~50 chars
  const chunkSize = 50;
  for (let i = 0; i < text.length; i += chunkSize) {
    const chunk = text.slice(i, i + chunkSize);
    events.push(`event: content_block_delta\ndata: ${JSON.stringify({ type: "content_block_delta", index: 0, delta: { type: "text_delta", text: chunk } })}\n\n`);
  }
  // content_block_stop
  events.push(`event: content_block_stop\ndata: ${JSON.stringify({ type: "content_block_stop", index: 0 })}\n\n`);
  // message_delta (stop)
  events.push(`event: message_delta\ndata: ${JSON.stringify({ type: "message_delta", delta: { stop_reason: "end_turn" } })}\n\n`);
  // message_stop
  events.push(`event: message_stop\ndata: ${JSON.stringify({ type: "message_stop" })}\n\n`);
  return events.join('');
}

/**
 * Create a non-streaming response (for chatComplete calls).
 */
function createNonStreamingResponse(text) {
  return {
    id: "msg_mock",
    type: "message",
    role: "assistant",
    content: [{ type: "text", text }],
    model: "claude-haiku-4-5-20251001",
    stop_reason: "end_turn"
  };
}

// ─── Fetch interceptor ───
let apiCallLog = [];
let mockEnabled = false;
const originalFetch = window.fetch;

function installFetchMock() {
  apiCallLog = [];
  mockEnabled = true;

  window.fetch = async function(url, opts) {
    const urlStr = typeof url === 'string' ? url : url?.url || '';

    // Only intercept Anthropic API calls
    if (!urlStr.includes('api.anthropic.com') || !mockEnabled) {
      return originalFetch.call(this, url, opts);
    }

    const body = opts?.body ? JSON.parse(opts.body) : {};
    const isStreaming = body.stream === true;
    const messages = body.messages || [];
    const lastMsg = messages[messages.length - 1];
    const userContent = typeof lastMsg?.content === 'string' ? lastMsg.content : '';

    // Detect which API call this is based on content
    let callType = 'unknown';
    let responseText = '';

    if (userContent.includes('clarification') || userContent.includes('clarify')) {
      callType = 'clarification';
      responseText = mockClarificationResponse();
    } else if (userContent.includes('plan') || userContent.includes('specification') || userContent.includes('spec')) {
      callType = 'planning';
      responseText = mockPlanResponse();
    } else if (userContent.includes('code review') || userContent.includes('review the following')) {
      callType = 'code-review';
      responseText = mockCodeReviewResponse();
    } else if (userContent.includes('visual') && userContent.includes('review')) {
      callType = 'visual-review';
      responseText = mockVisualReviewResponse();
    } else if (userContent.includes('agent') && userContent.includes('test')) {
      callType = 'agent-test';
      responseText = mockAgentTestResponse();
    } else if (userContent.includes('HTML') || userContent.includes('code') || userContent.includes('implement') || userContent.includes('build')) {
      callType = 'coding';
      responseText = MOCK_APP_HTML;
    } else {
      callType = 'fallback';
      responseText = mockClarificationResponse();
    }

    apiCallLog.push({ type: callType, streaming: isStreaming, timestamp: Date.now() });
    log(`API mock: ${callType} (${isStreaming ? 'streaming' : 'non-streaming'})`, 'info');

    // Simulate small network delay
    await new Promise(r => setTimeout(r, 50 + Math.random() * 100));

    if (isStreaming) {
      const sseData = createSSEStream(responseText);
      const encoder = new TextEncoder();
      const stream = new ReadableStream({
        start(controller) {
          // Send SSE data in event-boundary chunks (split on double newline)
          // This avoids splitting JSON data mid-line which breaks parsers
          const events = sseData.split('\n\n').filter(e => e.trim());
          let i = 0;
          function pushNext() {
            if (i < events.length) {
              controller.enqueue(encoder.encode(events[i] + '\n\n'));
              i++;
              setTimeout(pushNext, 10);
            } else {
              controller.close();
            }
          }
          pushNext();
        }
      });

      return new Response(stream, {
        status: 200,
        headers: { 'Content-Type': 'text/event-stream' }
      });
    } else {
      return new Response(JSON.stringify(createNonStreamingResponse(responseText)), {
        status: 200,
        headers: { 'Content-Type': 'application/json' }
      });
    }
  };
}

function uninstallFetchMock() {
  mockEnabled = false;
  window.fetch = originalFetch;
}

// ─── Helper: Load the app in a hidden iframe and get access to its internals ───
async function loadAppIframe() {
  return new Promise((resolve, reject) => {
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width: 414px; height: 896px; border: 1px solid #334155; border-radius: 12px; position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: none;';
    iframe.src = './index.html';

    const timeout = setTimeout(() => reject(new Error('App iframe load timeout (15s)')), 15000);

    iframe.onload = () => {
      clearTimeout(timeout);
      // Wait for React to mount
      setTimeout(() => resolve(iframe), 2000);
    };

    iframe.onerror = () => {
      clearTimeout(timeout);
      reject(new Error('App iframe failed to load'));
    };

    document.body.appendChild(iframe);
  });
}

// ─── Wait helpers ───
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function waitFor(fn, timeout = 10000, interval = 200) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    try {
      const result = fn();
      if (result) return result;
    } catch {}
    await wait(interval);
  }
  throw new Error(`waitFor timed out after ${timeout}ms`);
}

// ─── Run all tests ───
async function runTests() {
  totalTests = 18;

  // ═══════ Section 1: Build & Bundle Checks ═══════
  section('Build & Bundle Integrity');

  await test('Main app HTML loads', async () => {
    const resp = await originalFetch('./index.html');
    assert(resp.ok, `HTTP ${resp.status}`);
    const html = await resp.text();
    assert(html.length > 10000, `index.html too small: ${html.length} bytes`);

  await test('Service worker registered', async () => {
    const resp = await originalFetch('./registerSW.js');
    assert(resp.ok, 'registerSW.js not found');
    const text = await resp.text();

  await test('PWA icons accessible', async () => {
    for (const icon of ['icon-192.png', 'icon-512.png', 'apple-touch-icon.png']) {
      const resp = await originalFetch(`./${icon}`);
      assert(resp.ok, `${icon} returned ${resp.status}`);
    }
  });

  // ═══════ Section 2: SSE Mock Tests ═══════
  section('API Mock Infrastructure');

  await test('SSE stream mock produces valid Anthropic format', async () => {
    const sseData = createSSEStream('Hello world');
    assertIncludes(sseData, 'content_block_delta');
    assertIncludes(sseData, 'text_delta');
    assertIncludes(sseData, 'Hello world');
    assertIncludes(sseData, 'message_stop');
  });

  await test('Fetch mock intercepts Anthropic API calls', async () => {
    installFetchMock();
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          messages: [{ role: 'user', content: 'Test clarification question' }]
        })
      });
      assert(resp.ok, `Mock response status: ${resp.status}`);
      const json = await resp.json();
      assert(json.content?.[0]?.text, 'Mock response missing text content');
      const parsed = JSON.parse(json.content[0].text);
      assert(parsed.questions?.length > 0, 'Mock clarification should return questions');
      assert(apiCallLog.length === 1, `Expected 1 API call, got ${apiCallLog.length}`);
      assert(apiCallLog[0].type === 'clarification', `Expected clarification call, got ${apiCallLog[0].type}`);
    } finally {
      uninstallFetchMock();
    }
  });

  await test('Streaming mock returns proper ReadableStream', async () => {
    installFetchMock();
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          stream: true,
          messages: [{ role: 'user', content: 'Write me some code to implement this' }]
        })
      });
      assert(resp.ok, `Stream response status: ${resp.status}`);
      assert(resp.body, 'Response should have a body stream');

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      let tokenCount = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        fullText += chunk;
        const deltas = chunk.match(/content_block_delta/g);
        if (deltas) tokenCount += deltas.length;
      }

      assert(tokenCount > 0, `Expected content_block_delta events, got ${tokenCount}`);
      assertIncludes(fullText, 'message_stop');
      log(`Stream mock: received ${tokenCount} delta events`, 'success');
    } finally {
      uninstallFetchMock();
    }
  });

  // ═══════ Section 3: IndexedDB / Dexie Integration ═══════
  section('Database Integration');

  await test('Dexie database can be opened', async () => {
    const { Dexie } = await import('https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.mjs');
    const testDb = new Dexie('appforge');
    testDb.version(1).stores({
      apps: 'id, name, status, createdAt, updatedAt',
      appCode: 'appId, version',
      settings: 'key',
    });
    await testDb.open();
    assert(testDb.isOpen(), 'Database should be open');
    const tables = testDb.tables.map(t => t.name).sort();
    assert(tables.includes('apps'), 'Missing apps table');
    assert(tables.includes('appCode'), 'Missing appCode table');
    assert(tables.includes('settings'), 'Missing settings table');
    log(`Database tables: ${tables.join(', ')}`, 'success');
    testDb.close();
  });

  await test('Can write and read app metadata', async () => {
    const { Dexie } = await import('https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.mjs');
    const testDb = new Dexie('appforge');
    testDb.version(1).stores({
      apps: 'id, name, status, createdAt, updatedAt',
      appCode: 'appId, version',
      settings: 'key',
    });

    const testApp = {
      id: '__e2e_test_app__',
      name: 'E2E Test Counter',
      icon: '🧪',
      prompt: 'A simple counter app for e2e testing',
      clarifications: [],
      status: 'ready',
      createdAt: Date.now(),
      updatedAt: Date.now(),
      version: 1,
      installedOnHomescreen: false,
    };

    await testDb.table('apps').put(testApp);
    const read = await testDb.table('apps').get('__e2e_test_app__');
    assert(read, 'App not found after write');
    assert(read.name === 'E2E Test Counter', `Name mismatch: ${read.name}`);

    // Save test code
    await testDb.table('appCode').put({
      appId: '__e2e_test_app__',
      html: MOCK_APP_HTML,
      version: 1,
      sizeBytes: MOCK_APP_HTML.length,
    });

    const code = await testDb.table('appCode').get('__e2e_test_app__');
    assert(code, 'App code not found');
    assert(code.html.includes('Counter App'), 'Code content mismatch');

    log(`DB write/read OK: "${read.name}" + ${code.sizeBytes} bytes of code`, 'success');
    testDb.close();
  });

  // ═══════ Section 4: Full Pipeline Mock ═══════
  section('Full Pipeline Flow (Mocked)');

  await test('Pipeline: clarification → plan → code → review → done', async () => {
    installFetchMock();
    apiCallLog = [];

    // Helper: read an SSE stream and extract the full text using proper line-by-line parsing
    // (same approach as the real llm.ts)
    async function readSSEStream(resp) {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() ?? '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data: ')) continue;
          try {
            const json = JSON.parse(trimmed.slice(6));
            if (json.type === 'content_block_delta' && json.delta?.type === 'text_delta') {
              fullText += json.delta.text;
            }
          } catch { /* skip malformed */ }
        }
      }
      return fullText;
    }

    try {
      // 1. Clarification call (non-streaming)
      const clarResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'test-key' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 4096,
          messages: [{ role: 'user', content: 'Generate clarification questions for: A counter app' }]
        })
      });
      const clarJson = await clarResp.json();
      const clarText = clarJson.content[0].text;
      const clarParsed = JSON.parse(clarText);
      assert(clarParsed.questions?.length === 2, `Expected 2 questions, got ${clarParsed.questions?.length}`);

      // 2. Planning call (streaming)
      const planResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'test-key' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 8192,
          stream: true,
          messages: [{ role: 'user', content: 'Create a detailed specification and plan for: A counter app' }]
        })
      });
      const planText = await readSSEStream(planResp);
      const planParsed = JSON.parse(planText);
      assert(planParsed.name === 'Simple Counter', `Plan name: ${planParsed.name}`);
      assert(planParsed.icon === '🔢', `Plan icon: ${planParsed.icon}`);

      // 3. Coding call (streaming)
      const codeResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'test-key' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 16384,
          stream: true,
          messages: [{ role: 'user', content: 'Implement the code as a single HTML file' }]
        })
      });
      const codeText = await readSSEStream(codeResp);
      assertIncludes(codeText, '<!DOCTYPE html>');
      assertIncludes(codeText, 'Counter App');

      // 4. Code review (non-streaming)
      const reviewResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'test-key' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 4096,
          messages: [{ role: 'user', content: 'Perform a code review of the following HTML app' }]
        })
      });
      const reviewJson = await reviewResp.json();
      const reviewParsed = JSON.parse(reviewJson.content[0].text);
      assert(reviewParsed.hasCriticalBugs === false, 'Mock review should have no critical bugs');

      // Verify call log
      const types = apiCallLog.map(c => c.type);
      log(`API call sequence: ${types.join(' → ')}`, 'success');
      assert(types.includes('clarification'), 'Missing clarification call');
      assert(types.includes('planning'), 'Missing planning call');
      assert(types.includes('coding'), 'Missing coding call');
      assert(types.includes('code-review'), 'Missing code-review call');

    } finally {
      uninstallFetchMock();
    }
  });

  // ═══════ Section 5: App Runner Tests ═══════
  section('App Runner & Rendering');

  await test('Generated HTML renders in iframe', async () => {
    const blob = new Blob([MOCK_APP_HTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);

    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts allow-forms allow-modals';
    iframe.style.cssText = 'width:414px;height:300px;border:none;position:absolute;left:-9999px;';
    document.body.appendChild(iframe);

    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('iframe load timeout')), 5000);
      iframe.onload = () => { clearTimeout(timeout); resolve(); };
      iframe.src = url;
    });

    // Check content rendered
    await wait(500);
    try {
      const title = iframe.contentDocument?.title;
      assert(title === 'Test Counter App', `Expected title "Test Counter App", got "${title}"`);
    } catch {
      // Cross-origin — blob URLs may restrict access in some browsers
      log('iframe content check skipped (sandbox restriction)', 'warn');
    }

    URL.revokeObjectURL(url);
    iframe.remove();
  });

  await test('Blob URL lifecycle (create → use → revoke)', async () => {
    const html = '<html><body>test</body></html>';
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    assert(url.startsWith('blob:'), `Expected blob: URL, got ${url}`);

    // Verify it's fetchable
    const resp = await originalFetch(url);
    assert(resp.ok, 'Blob URL fetch failed');
    const text = await resp.text();
    assertIncludes(text, 'test');

    // Revoke
    URL.revokeObjectURL(url);
    log('Blob URL lifecycle OK', 'success');
  });

  // ═══════ Section 6: Install Store ═══════
  section('Install Store & PWA');

  await test('installStore initializes correctly', async () => {
    // Test the store pattern manually
    const storeState = {
      deferredPrompt: null,
      installed: false,
    };
    assert(storeState.deferredPrompt === null, 'deferredPrompt should start null');
    assert(storeState.installed === false, 'installed should start false');
  });

  await test('beforeinstallprompt event flow', async () => {
    // Simulate the flow: event fires → store captures → triggerInstall → prompt shown → accepted
    let capturedPrompt = null;

    // Mock the event
    const mockEvent = {
      preventDefault: () => {},
      prompt: async () => {},
      userChoice: Promise.resolve({ outcome: 'accepted' }),
    };

    // Simulate capture
    capturedPrompt = mockEvent;
    assert(capturedPrompt !== null, 'Prompt should be captured');

    // Simulate triggerInstall
    capturedPrompt.prompt();
    const result = await capturedPrompt.userChoice;
    assert(result.outcome === 'accepted', `Expected accepted, got ${result.outcome}`);

    // After install, clear prompt
    capturedPrompt = null;
    assert(capturedPrompt === null, 'Prompt should be cleared after install');
    log('Install flow simulation OK', 'success');
  });

  await test('Dynamic manifest generation', async () => {
    // Test the emoji-to-icon and manifest generation logic
    const canvas = document.createElement('canvas');
    canvas.width = 192;
    canvas.height = 192;
    const ctx = canvas.getContext('2d');
    assert(ctx, 'Canvas 2D context required');

    ctx.fillStyle = '#1e293b';
    ctx.beginPath();
    ctx.roundRect(0, 0, 192, 192, 192 * 0.2);
    ctx.fill();
    ctx.font = `${192 * 0.6}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔢', 96, 96 + 192 * 0.05);

    const dataUrl = canvas.toDataURL('image/png');
    assert(dataUrl.startsWith('data:image/png;base64,'), 'Should produce valid PNG data URL');
    assert(dataUrl.length > 100, `Data URL too short: ${dataUrl.length}`);

    // Build manifest
    const manifest = {
      name: 'Test Counter',
      short_name: 'Test Count',
      description: 'A test counter',
      start_url: window.location.href,
      display: 'standalone',
      background_color: '#0f172a',
      theme_color: '#6366f1',
      icons: [
        { src: dataUrl, sizes: '192x192', type: 'image/png' },
      ],
    };

    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const manifestUrl = URL.createObjectURL(manifestBlob);
    assert(manifestUrl.startsWith('blob:'), 'Manifest blob URL creation failed');

    URL.revokeObjectURL(manifestUrl);
    log('Dynamic manifest generation OK', 'success');
  });

  // ═══════ Section 7: Error Handling ═══════
  section('Error Handling & Edge Cases');

  await test('API error response handled gracefully', async () => {
    installFetchMock();
    // Override to return an error
    const savedFetch = window.fetch;
    window.fetch = async function(url, opts) {
      const urlStr = typeof url === 'string' ? url : url?.url || '';
      if (urlStr.includes('api.anthropic.com')) {
        return new Response(JSON.stringify({ error: { type: 'authentication_error', message: 'Invalid API key' } }), {
          status: 401,
          headers: { 'Content-Type': 'application/json' }
        });
      }
      return originalFetch.call(this, url, opts);
    };

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'test', max_tokens: 100, messages: [{ role: 'user', content: 'test' }] })
      });
      assert(resp.status === 401, `Expected 401, got ${resp.status}`);
      const errJson = await resp.json();
      assert(errJson.error?.type === 'authentication_error', 'Error type mismatch');
      log('API error handling OK', 'success');
    } finally {
      window.fetch = savedFetch;
      uninstallFetchMock();
    }
  });

  await test('stripJsonFences handles all markdown fence variants', async () => {
    function stripJsonFences(raw) {
      let s = raw.trim();
      const fenceMatch = s.match(/```(?:json)?\s*\n?([\s\S]*?)\n?\s*```/);
      if (fenceMatch) return fenceMatch[1].trim();
      return s;
    }

    // Plain JSON
    const plain = '{"key": "value"}';
    assert(stripJsonFences(plain) === plain, 'Plain JSON should pass through');

    // ```json fenced
    const fenced = '```json\n{"key": "value"}\n```';
    assert(stripJsonFences(fenced) === '{"key": "value"}', 'json-fenced failed');

    // ``` fenced (no language tag)
    const bare = '```\n{"key": "value"}\n```';
    assert(stripJsonFences(bare) === '{"key": "value"}', 'bare-fenced failed');

    // With whitespace
    const spacy = '  ```json\n  {"key": "value"}  \n  ```  ';
    const result = stripJsonFences(spacy);
    assert(result.includes('"key"'), 'Whitespace-fenced failed');

    log('stripJsonFences all variants OK', 'success');
  });

  // ═══════ Section 8: Cleanup ═══════
  section('Cleanup');

  await test('Remove e2e test data from database', async () => {
    const { Dexie } = await import('https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.mjs');
    const testDb = new Dexie('appforge');
    testDb.version(1).stores({
      apps: 'id, name, status, createdAt, updatedAt',
      appCode: 'appId, version',
      settings: 'key',
    });

    await testDb.table('apps').delete('__e2e_test_app__');
    await testDb.table('appCode').delete('__e2e_test_app__');

    const remaining = await testDb.table('apps').get('__e2e_test_app__');
    assert(!remaining, 'Test app should be deleted');

    testDb.close();
    log('Cleanup complete', 'success');
  });

  // ─── Summary ───
  const passed = results.filter(r => r.passed === true).length;
  const failed = results.filter(r => r.passed === false).length;
  const skipped = results.filter(r => r.passed === null).length;

  summaryEl.textContent = failed === 0
    ? `✅ All ${passed} tests passed!${skipped ? ` (${skipped} skipped)` : ''}`
    : `❌ ${failed} test${failed > 1 ? 's' : ''} failed out of ${passed + failed}${skipped ? ` (${skipped} skipped)` : ''}`;
  summaryEl.className = `summary ${failed === 0 ? 'all-pass' : 'has-fail'}`;
  progressEl.textContent = `Complete: ${passed} passed, ${failed} failed${skipped ? `, ${skipped} skipped` : ''}`;

  log(`\nFinal: ${passed}/${passed + failed} passed${skipped ? `, ${skipped} skipped` : ''}`, failed === 0 ? 'success' : 'error');
}

runTests().catch(err => {
  log(`Fatal error: ${err.message}`, 'error');
  summaryEl.textContent = `💥 Fatal error: ${err.message}`;
  summaryEl.className = 'summary has-fail';
});
</script>
